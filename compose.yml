
services:
  dnsdist:
    image: powerdns/dnsdist-21
    container_name: dnsdist
    network_mode: host
    volumes:
      - ./etc/dnsdist:/etc/dnsdist:ro
    command: ["dnsdist", "-C", "/etc/dnsdist/dnsdist.conf", "--supervised"]
    restart: unless-stopped
    depends_on:
      - pdns-auth
      - pdns-recursor

  pdns-auth:
    image: powerdns/pdns-auth-50
    container_name: pdns-auth
    volumes:
      - ./etc/pdns-auth:/etc/powerdns/pdns.d:ro
      - ./data/pdns-auth:/var/lib/powerdns
    expose:
      - "53/tcp"
      - "53/udp"
      - "8081/tcp"
    restart: unless-stopped

  pdns-recursor:
    image: powerdns/pdns-recursor-55
    container_name: pdns-recursor
    volumes:
      - ./etc/pdns-recursor:/etc/powerdns:ro
    command: ["--config-dir=/etc/powerdns"]
    expose:
      - "53/tcp"
      - "53/udp"
    restart: unless-stopped

  powerdns-admin:
    image: powerdnsadmin/pda-legacy:latest
    container_name: powerdns-admin
    ports:
      - "${PDA_PORT}:80"
    environment:
      - SECRET_KEY=${PDA_SECRET_KEY}
      - SQLALCHEMY_DATABASE_URI=${PDA_SQLALCHEMY_DATABASE_URI}
    volumes:
      - ./data/pdns-admin:/data
    restart: unless-stopped
    depends_on:
      - pdns-auth
